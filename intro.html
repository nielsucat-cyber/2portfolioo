<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple World</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Comic Sans MS", cursive;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:url("download.jfif") no-repeat center center/cover;
}

/* LOADING SCREEN */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#ffb3b3;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    color:white;
    z-index:1000;
    animation: fadeOut 2s forwards;
    animation-delay:2s;
}

@keyframes fadeOut{
    to{opacity:0; visibility:hidden;}
}

/* Soft overlay */
.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(255,230,230,0.6);
}

/* MAIN CARD */
.container{
    position:relative;
    z-index:2;
    background:#fffaf0;
    padding:50px;
    border-radius:40px;
    width:420px;
    text-align:center;
    box-shadow:0 20px 40px rgba(255,0,0,0.3);
}

/* Apple character */
.apple{
    position:relative;
    width:120px;
    height:120px;
    background:#e63946;
    border-radius:50%;
    margin:0 auto 20px;
    transition:0.3s;
}

.leaf{
    position:absolute;
    width:50px;
    height:30px;
    background:#2a9d8f;
    border-radius:50%;
    top:-20px;
    left:35px;
    transform:rotate(-30deg);
}

.eye{
    position:absolute;
    width:15px;
    height:15px;
    background:black;
    border-radius:50%;
    top:45px;
    animation:blink 4s infinite;
}

.eye.left{ left:35px; }
.eye.right{ right:35px; }

@keyframes blink{
    0%,90%,100%{ height:15px; }
    95%{ height:2px; }
}

.smile{
    position:absolute;
    width:40px;
    height:20px;
    border-bottom:4px solid black;
    border-radius:0 0 40px 40px;
    bottom:35px;
    left:40px;
    transition:0.3s;
}

/* Blush cheeks */
.blush{
    position:absolute;
    width:25px;
    height:15px;
    background:pink;
    border-radius:50%;
    top:65px;
    opacity:0;
    transition:0.3s;
}

.blush.left{ left:20px; }
.blush.right{ right:20px; }

/* Hover effects */
.apple:hover{
    transform:scale(1.08);
}

.apple:hover .blush{
    opacity:0.8;
}

.apple:hover .smile{
    border-bottom:6px solid black;
}

/* Buttons */
.btn{
    display:block;
    margin:10px 0;
    padding:12px;
    border-radius:30px;
    text-decoration:none;
    background:#8ac926;
    color:white;
    font-weight:bold;
    transition:0.3s;
    position:relative;
}

.btn:hover{
    transform:scale(1.1);
    background:#6bbf00;
}

.btn::after{
    content:"✨";
    position:absolute;
    right:15px;
    opacity:0;
    transition:0.3s;
}

.btn:hover::after{
    opacity:1;
}

/* Falling apples */
.falling{
    position:absolute;
    top:-50px;
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{ transform:translateY(110vh); }
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loader">🍎 Loading sweetness... 🍎</div>

<div class="overlay"></div>

<!-- Falling Apples Script -->
<script>
for(let i=0;i<12;i++){
    let apple=document.createElement("div");
    apple.classList.add("falling");
    apple.innerHTML="🍎";
    apple.style.left=Math.random()*100+"vw";
    apple.style.animationDuration=(Math.random()*5+5)+"s";
    document.body.appendChild(apple);
}
</script>

<div class="container">

    <!-- Apple Character -->
    <div class="apple">
        <div class="leaf"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="smile"></div>
        <div class="blush left"></div>
        <div class="blush right"></div>
    </div>

    <h1>Apple Portfolio 🍎</h1>
    <p>Kinds of Apples!</p>

    <a href="about.html" class="btn">About me Apple</a>
    <a href="ICT.html" class="btn">ICT Apple</a>
    <a href="Events.html" class="btn">Events Apple</a>
    <a href="AP.html" class="btn">AP Apple</a>
</div>

<!-- Background Music -->
<audio id="bgm" src="music.mp3" autoplay loop></audio>

<script>
const music = document.getElementById("bgm");

/* If browser blocks autoplay, play on first click */
document.addEventListener("click", () => {
    music.play();
}, { once: true });
</script>

</body>
</html>
